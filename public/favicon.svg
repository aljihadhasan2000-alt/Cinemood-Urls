<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#8B5CF6" flood-opacity="0.5" />
    </filter>
  </defs>
  <rect width="100" height="100" rx="20" fill="#080808" />
  <g filter="url(#shadow)">
    <!-- Cinematic Prism / Laser Reels -->
    <polygon points="50,20 80,70 20,70" fill="none" stroke="url(#glow)" stroke-width="6" stroke-linejoin="round" />
    <circle cx="50" cy="50" r="10" fill="url(#glow)" />
    <!-- Light shine sparkles -->
    <path d="M50,10 L50,25 M50,75 L50,90 M10,50 L25,50 M75,50 L90,50" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
